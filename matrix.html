<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Deep Matrix Columns 3D — Zosia</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000201;
        }

        #status {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 8, 4, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 100, 0.15);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            color: rgba(0, 255, 100, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.5s;
            pointer-events: none;
        }

        #status.speaking {
            border-color: rgba(0, 255, 100, 0.4);
            color: #00ff8c;
        }
    </style>
    <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
</script>
</head>

<body>
    <div id="status">
        <div class="dot" style="width:7px; height:7px; border-radius:50%; background:#00220a;"></div>
        <span id="statusLabel">ZOSIA MATRIX COLUMNS</span>
    </div>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, columns = [];
        let isSpeaking = false;
        let clock = new THREE.Clock();

        const charset = "日Hｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ23456789ZOSIA";

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // --- INCREASED DENSITY COLUMN SYSTEM ---
            const colCount = 220;
            const textures = [];
            for (let i = 0; i < 50; i++) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 64; canvas.height = 64;
                ctx.fillStyle = 'white';
                ctx.font = 'bold 50px monospace';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(charset[Math.floor(Math.random() * charset.length)], 32, 32);
                textures.push(new THREE.CanvasTexture(canvas));
            }

            for (let i = 0; i < colCount; i++) {
                const r = 1.0 + Math.random() * 14; // Slightly wider spread
                const a = Math.random() * Math.PI * 2;
                const x = Math.cos(a) * r;
                const z = Math.sin(a) * r;

                const colSpeed = 0.015 + Math.random() * 0.045;
                const symbolsInCol = 8 + Math.floor(Math.random() * 12); // Slightly shorter columns but more of them
                const colSymbols = [];

                for (let j = 0; j < symbolsInCol; j++) {
                    const material = new THREE.SpriteMaterial({
                        map: textures[Math.floor(Math.random() * textures.length)],
                        color: 0x00ff80,
                        transparent: true,
                        opacity: 0.15 + (j / symbolsInCol) * 0.5
                    });
                    const sprite = new THREE.Sprite(material);
                    sprite.position.set(x, (j * 0.8) - (symbolsInCol * 0.4), z);
                    sprite.scale.set(0.28, 0.28, 1); // Slightly smaller for higher density
                    scene.add(sprite);

                    colSymbols.push({
                        mesh: sprite,
                        yOffset: (j * 0.8) - (symbolsInCol * 0.4)
                    });
                }

                columns.push({
                    x: x, z: z,
                    radius: r,
                    angle: a,
                    symbols: colSymbols,
                    speed: colSpeed,
                    yPos: Math.random() * 20 - 10,
                    vibrateOffset: Math.random() * Math.PI * 2
                });
            }

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        async function checkVoice() {
            try {
                // 1. TRY LOCAL BRIDGE (PREMIUM - LOCAL MAC)
                const r = await fetch('http://127.0.0.1:7777/speaking', { signal: AbortSignal.timeout(500) });
                const data = await r.json();
                isSpeaking = data.speaking;
            } catch (e) {
                // 2. FALLBACK TO BROWSER NATIVE (MOBILE / GITHUB PAGES)
                isSpeaking = window.speechSynthesis.speaking;
            }

            const st = document.getElementById('status');
            const dot = st.querySelector('.dot');
            if (isSpeaking) {
                st.classList.add('speaking');
                dot.style.background = "#00ff8c";
                dot.style.boxShadow = "0 0 15px #00ff8c";
            } else {
                st.classList.remove('speaking');
                dot.style.background = "#00220a";
                dot.style.boxShadow = "none";
            }
        }
        setInterval(checkVoice, 100);

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();

            columns.forEach((col) => {
                // 1. UPDATE COLUMN BASE POSITION
                col.yPos += col.speed;
                if (col.yPos > 14) col.yPos = -14;

                const time = delta * 0.4;
                // GENTLER FLOAT INSTEAD OF SHAKING
                const vibX = Math.sin(time * 2 + col.vibrateOffset) * (isSpeaking ? 0.35 : 0.05);
                const vibZ = Math.cos(time * 2 + col.vibrateOffset) * (isSpeaking ? 0.35 : 0.05);

                col.symbols.forEach((s) => {
                    let finalY = col.yPos + s.yOffset;
                    if (finalY > 12) finalY -= 24;
                    if (finalY < -12) finalY += 24;

                    s.mesh.position.y = finalY;

                    const colorPos = (finalY + 12) / 24;
                    let targetHue, targetSat, targetLight;

                    if (colorPos < 0.5) {
                        targetHue = 0.35; targetSat = 1.0;
                        targetLight = THREE.MathUtils.lerp(0.15, 0.5, colorPos * 2);
                    } else {
                        targetHue = THREE.MathUtils.lerp(0.35, 0.45, (colorPos - 0.5) * 2);
                        targetSat = 0.8; targetLight = THREE.MathUtils.lerp(0.5, 0.7, (colorPos - 0.5) * 2);
                    }

                    if (isSpeaking) {
                        // HARMONIC BREATHE EFFECT
                        const breathe = Math.sin(delta * 3 - col.radius * 0.5) * 0.5 + 0.5;
                        const expansion = 1 + (breathe * 0.25);

                        s.mesh.position.x = Math.cos(col.angle) * col.radius * expansion + vibX;
                        s.mesh.position.z = Math.sin(col.angle) * col.radius * expansion + vibZ;

                        const glowPulse = Math.sin(delta * 4 + col.vibrateOffset) * 0.5 + 0.5;
                        s.mesh.material.color.setHSL(targetHue, targetSat, targetLight + glowPulse * 0.2);
                        s.mesh.material.opacity = 0.4 + glowPulse * 0.4;
                        s.mesh.scale.set(0.35 + breathe * 0.1, 0.35 + breathe * 0.1, 1);
                    } else {
                        s.mesh.position.x = THREE.MathUtils.lerp(s.mesh.position.x, Math.cos(col.angle) * col.radius + vibX, 0.05);
                        s.mesh.position.z = THREE.MathUtils.lerp(s.mesh.position.z, Math.sin(col.angle) * col.radius + vibZ, 0.05);
                        s.mesh.material.color.setHSL(targetHue, targetSat, targetLight);
                        s.mesh.material.opacity = THREE.MathUtils.lerp(s.mesh.material.opacity, 0.25, 0.1);
                        s.mesh.scale.set(0.28, 0.28, 1);
                    }
                });
            });

            camera.position.x = Math.sin(delta * 0.12) * 1.5;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>

</html>
